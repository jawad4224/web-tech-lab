<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <h1>Student Registration</h1>
        <form id="regForm">
            <label>First Name <span class="required">*</span></label>
            <input type="text" id="fname" placeholder="Enter your last name">
            <br><br>

            <label>Last Name <span class="required">*</span></label>
            <input type="text" id="lname" placeholder="Enter your first name">
            <br><br>

            <label>Student ID <span class="required">*</span></label>
            <input type="text" id="stID" placeholder="xx-xxxxx-x">
            <br><br>

            <label>Email <span class="required">*</span></label>
            <input type="email" id="email" placeholder="xx-xxxxx-x@student.aiub.edu">
            <br><br>

            <label>Credit Completed <span class="required">*</span></label>
            <input type="number" id="crdNum" >
            <br><br>

            <label>Department <span class="required">*</span></label>
            <select id="department">
                <option value="">Select Department</option>
                <option value="CSE">CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
            </select>
            <br><br>

            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="view-details-container">
        <h1>Registered Students</h1>
        <table id="stdTable">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Credit Completed</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script src="reg.js"></script>

</body>

</html>
